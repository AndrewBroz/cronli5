name: CI

on:
  push:
    branches: [main, master, develop]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20.x, 22.x]
    name: Node ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v5
      - name: Use Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm
      - run: npm ci
      # The one gate definition: lint, typecheck, type tests, the full suite
      # under coverage thresholds, conciseness, generated-docs freshness, and
      # the build — identical to the local pre-push hook.
      - run: npm run verify
